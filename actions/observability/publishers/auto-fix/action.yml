name: "Auto Fix"
description: "Generate fix PRs for known auto-fixable failure types (whitelist-based). P3 feature."

inputs:
  repo:
    description: "Repository name (org/repo)"
    required: true
  run-id:
    description: "Run database ID"
    required: true
  fingerprint:
    description: "Error fingerprint"
    required: true
  category:
    description: "Failure category"
    required: true
  fix-type:
    description: "Fix type: formatting, yaml, lockfile"
    required: true
  token:
    description: "GitHub token with repo write access"
    required: true

outputs:
  pr-url:
    description: "URL of the created fix PR"
    value: ${{ steps.fix.outputs.pr-url }}
  skipped:
    description: "Whether the fix was skipped (not in whitelist)"
    value: ${{ steps.fix.outputs.skipped }}

runs:
  using: "composite"
  steps:
    - id: fix
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        REPO="${{ inputs.repo }}"
        RUN_ID="${{ inputs.run-id }}"
        FINGERPRINT="${{ inputs.fingerprint }}"
        FIX_TYPE="${{ inputs.fix-type }}"

        # Whitelist check
        allowed_types=("formatting" "yaml" "lockfile")
        is_allowed=false
        for t in "${allowed_types[@]}"; do
          if [ "$FIX_TYPE" = "$t" ]; then
            is_allowed=true
            break
          fi
        done

        if [ "$is_allowed" = "false" ]; then
          echo "::notice::Fix type '$FIX_TYPE' not in whitelist, skipping"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "pr-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Daily auto-fix budget check (max 3 per day)
        TODAY=$(date -u +%Y-%m-%d)
        if [ -f ".state-cache/data.json" ]; then
          fix_count=$(jq -r ".auto_fix["$TODAY"] // 0" ".state-cache/data.json" 2>/dev/null || echo 0)
        else
          fix_count=0
        fi

        if [ "$fix_count" -ge 3 ]; then
          echo "::warning::Auto-fix daily budget exhausted ($fix_count/3)"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "pr-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Clone repo and checkout the failed commit
        CLONE_DIR=$(mktemp -d)
        git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$CLONE_DIR" --depth=1 2>/dev/null

        BRANCH="auto-fix/${FINGERPRINT}"
        cd "$CLONE_DIR"
        git checkout -b "$BRANCH" 2>/dev/null

        FIXED=false
        case "$FIX_TYPE" in
          formatting)
            if [ -f "package.json" ]; then
              npm ci --ignore-scripts 2>/dev/null || true
              npx prettier --write . 2>/dev/null && FIXED=true || true
            fi
            ;;
          yaml)
            if command -v yamllint &>/dev/null; then
              find . -name "*.yml" -o -name "*.yaml" | head -20 |                 xargs yamllint -d relaxed --fix 2>/dev/null && FIXED=true || true
            fi
            ;;
          lockfile)
            if [ -f "package-lock.json" ]; then
              npm install --package-lock-only 2>/dev/null && FIXED=true || true
            elif [ -f "requirements.txt" ]; then
              pip install -r requirements.txt 2>/dev/null && FIXED=true || true
            fi
            ;;
        esac

        if [ "$FIXED" = "false" ]; then
          echo "::notice::No changes produced by auto-fix"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "pr-url=" >> "$GITHUB_OUTPUT"
          rm -rf "$CLONE_DIR"
          exit 0
        fi

        # Check if there are actual changes
        if git diff --quiet 2>/dev/null; then
          echo "::notice::No diff after fix"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "pr-url=" >> "$GITHUB_OUTPUT"
          rm -rf "$CLONE_DIR"
          exit 0
        fi

        # Commit and push
        git config user.name "evolveCI bot"
        git config user.email "bot@evolveci.dev"
        git add -A
        git commit -m "[auto-fix] $FIX_TYPE: fix for $FINGERPRINT"
        git push origin "$BRANCH" 2>/dev/null

        # Create PR
        PR_URL=$(gh api "repos/${REPO}/pulls"           --method POST           --field title="[auto-fix] $FIX_TYPE: $FINGERPRINT"           --field head="$BRANCH"           --field base="main"           --field body="## Auto-fix: $FIX_TYPE

        - **Fingerprint**: \`$FINGERPRINT\`
        - **Run**: $RUN_ID
        - **Fix type**: $FIX_TYPE

        This PR was auto-generated by evolveCI. Review carefully before merging.

        ---
        _Automated by evolveCI auto-fix_"           --jq '.html_url' 2>/dev/null || echo "")

        echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        echo "skipped=false" >> "$GITHUB_OUTPUT"

        rm -rf "$CLONE_DIR"
        echo "::notice::Auto-fix PR created: $PR_URL"
