name: "Post Slack Report"
description: "Send structured Slack report via incoming webhook."

inputs:
  webhook-url:
    description: "Slack webhook URL"
    required: true
  title:
    description: "Message title"
    required: true
  message:
    description: "Message body"
    required: true
  status:
    description: "Status level: info, warning, critical"
    required: false
    default: "info"

runs:
  using: "composite"
  steps:
    - id: slack
      shell: bash
      run: |
        set -euo pipefail

        WEBHOOK="${{ inputs.webhook-url }}"
        TITLE="${{ inputs.title }}"
        MESSAGE="${{ inputs.message }}"
        STATUS="${{ inputs.status }}"

        if [ -z "$WEBHOOK" ]; then
          echo "::warning::No Slack webhook configured, skipping notification"
          exit 0
        fi

        # Select emoji based on status
        case "$STATUS" in
          critical) ICON=":rotating_light:" ;;
          warning)  ICON=":warning:" ;;
          *)        ICON=":information_source:" ;;
        esac

        PAYLOAD=$(jq -n \
          --arg text "$ICON *$TITLE*\n$MESSAGE" \
          '{text: $text}')

        curl -sS -X POST -H 'Content-type: application/json' \
          --data "$PAYLOAD" \
          "$WEBHOOK" 2>/dev/null || echo "::warning::Slack notification failed (non-blocking)"

        echo "::notice::Slack notification sent: $TITLE"
