name: "Auto Rerun"
description: "Rerun failed jobs with budget checks and forbidden workflow filtering."

inputs:
  repo:
    description: "Repository name (org/repo)"
    required: true
  run-id:
    description: "Run database ID"
    required: true
  workflow-name:
    description: "Workflow name"
    required: true
  daily-budget:
    description: "Max reruns per workflow per day"
    required: false
    default: "3"
  token:
    description: "GitHub token"
    required: true

outputs:
  rerun:
    description: "Result: rerunned, skipped-forbidden, or empty"
    value: ${{ steps.rerun.outputs.result }}
  budget-remaining:
    description: "Remaining budget"
    value: ${{ steps.rerun.outputs.budget-remaining }}

runs:
  using: "composite"
  steps:
    - id: rerun
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        REPO="${{ inputs.repo }}"
        RUN_ID="${{ inputs.run-id }}"
        WORKFLOW="${{ inputs.workflow-name }}"
        DAILY_BUDGET="${{ inputs.daily-budget }}"
        TODAY=$(date -u +%Y-%m-%d)
        COUNTER_KEY="$REPO/$WORKFLOW/$TODAY"

        # Check forbidden workflows
        forbidden_patterns=("deploy" "security" "scan" "sign")
        for pat in "${forbidden_patterns[@]}"; do
          if echo "$WORKFLOW" | grep -qi "$pat"; then
            echo "::notice::Workflow '$WORKFLOW' contains forbidden keyword '$pat', skipping rerun"
            {
              echo "result=skipped-forbidden"
              echo "budget-remaining=$DAILY_BUDGET"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
        done

        # Read current counter from state
        state_path="daily-counters/$TODAY.json"
        current_count=0

        if [ -f ".state-cache/data.json" ]; then
          current_count=$(jq -r --arg k "$COUNTER_KEY" '.reruns[$k] // 0' ".state-cache/data.json" 2>/dev/null || echo 0)
        fi

        # Check budget
        if [ "$current_count" -ge "$DAILY_BUDGET" ]; then
          echo "::warning::Budget exhausted for $WORKFLOW ($current_count/$DAILY_BUDGET)"
          {
            echo "result="
            echo "budget-remaining=0"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Execute rerun
        gh run rerun "$RUN_ID" --repo "$REPO" --failed 2>/dev/null

        new_count=$((current_count + 1))
        remaining=$((DAILY_BUDGET - new_count))

        # Write counter update
        counter_json=$(jq -n --arg k "$COUNTER_KEY" --argjson v "$new_count" '{reruns: {($k): $v}}')

        {
          echo "result=rerunned"
          echo "budget-remaining=$remaining"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::Rerun $RUN_ID ($new_count/$DAILY_BUDGET used)"

        # Store counter for write-state step
        echo "$counter_json" > /tmp/rerun-counter.json
