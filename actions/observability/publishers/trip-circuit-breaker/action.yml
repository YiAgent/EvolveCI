name: "Trip Circuit Breaker"
description: "Create issue and notify when budget dimension is exceeded."

inputs:
  repo:
    description: "Repository name"
    required: true
  workflow-name:
    description: "Workflow name"
    required: true
  reason:
    description: "Reason for tripping"
    required: true
  dimension:
    description: "Budget dimension: workflow, pattern, repo"
    required: true
  history:
    description: "JSON array of recent history"
    required: false
    default: "[]"

runs:
  using: "composite"
  steps:
    - id: trip
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        REPO="${{ inputs.repo }}"
        WORKFLOW="${{ inputs.workflow-name }}"
        REASON="${{ inputs.reason }}"
        DIMENSION="${{ inputs.dimension }}"
        HISTORY='${{ inputs.history }}'

        TITLE="[Circuit Breaker] $REPO/$WORKFLOW - $DIMENSION budget exceeded"

        BODY="## Circuit Breaker Tripped

        - **Repository**: $REPO
        - **Workflow**: $WORKFLOW
        - **Dimension**: $DIMENSION
        - **Reason**: $REASON

        ### Recent History

        \`\`\`json
        $HISTORY
        \`\`\`

        ### Recovery

        Remove the \`ci:circuit-broken\` label from this issue to resume auto-triage.

        ---
        _Automated by evolveCI_"


        # Create issue
        ISSUE_URL=$(gh issue create \
          --repo "$REPO" \
          --title "$TITLE" \
          --body "$BODY" \
          --label "ci:circuit-broken,severity/critical" \
          2>/dev/null) || echo "::warning::Failed to create issue"

        # Update circuit state on the single evolveci/circuit issue (v5 issues-as-memory).
        # We *upsert* the body JSON. Schema:
        #   { active, reason, tripped_at, tripped_dimension, auto_recover_at }
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        RECOVER_AT=$(date -u -d "+24 hours" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                     date -u -v+24H +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "")

        STATE_JSON=$(jq -nc \
          --arg reason "$REASON ($DIMENSION budget exceeded for $REPO/$WORKFLOW)" \
          --arg tripped_at "$NOW" \
          --arg dimension "$DIMENSION" \
          --arg recover_at "$RECOVER_AT" \
          '{active: true, reason: $reason, tripped_at: $tripped_at, tripped_dimension: $dimension, auto_recover_at: $recover_at}')

        EXISTING=$(gh issue list --repo "$REPO" --label evolveci/circuit \
                     --state all -L 1 --json number --jq '.[0].number // empty')

        if [ -n "$EXISTING" ]; then
          gh issue edit "$EXISTING" --repo "$REPO" --body "$STATE_JSON" >/dev/null \
            || echo "::warning::Failed to update evolveci/circuit issue #$EXISTING"
          gh issue reopen "$EXISTING" --repo "$REPO" >/dev/null 2>&1 || true
        else
          gh issue create --repo "$REPO" \
            --title "circuit: tripped" \
            --label "evolveci/circuit,severity/critical" \
            --body "$STATE_JSON" >/dev/null \
            || echo "::warning::Failed to create evolveci/circuit issue"
        fi

        echo "::error::Circuit breaker tripped: $DIMENSION budget exceeded for $REPO/$WORKFLOW"
