name: "Post Notification"
description: "Unified multi-channel notification gateway. Routes notifications to Slack/Discord/Issue based on severity."

inputs:
  title:
    description: "Notification title"
    required: true
  message:
    description: "Notification body"
    required: true
  severity:
    description: "Severity level: critical, high, medium, low"
    required: true
  slack-webhook:
    description: "Slack incoming webhook URL"
    required: false
    default: ""
  discord-webhook:
    description: "Discord webhook URL"
    required: false
    default: ""
  repo:
    description: "Repository name for issue context"
    required: false
    default: ""

outputs:
  channels-sent:
    description: "Comma-separated list of channels that received the notification"
    value: ${{ steps.notify.outputs.channels-sent }}

runs:
  using: "composite"
  steps:
    - id: notify
      shell: bash
      run: |
        set -euo pipefail

        TITLE="${{ inputs.title }}"
        MESSAGE="${{ inputs.message }}"
        SEVERITY="${{ inputs.severity }}"
        SLACK_WEBHOOK="${{ inputs.slack-webhook }}"
        DISCORD_WEBHOOK="${{ inputs.discord-webhook }}"

        channels=()

        # --- Slack (critical, high) ---
        if [ "$SEVERITY" = "critical" ] || [ "$SEVERITY" = "high" ]; then
          if [ -n "$SLACK_WEBHOOK" ]; then
            case "$SEVERITY" in
              critical) ICON=":rotating_light:" ;;
              high)     ICON=":warning:" ;;
              *)        ICON=":information_source:" ;;
            esac
            PAYLOAD=$(jq -n --arg text "$ICON *$TITLE*\n$MESSAGE" '{text: $text}')
            curl -sS -X POST -H "Content-type: application/json"               --data "$PAYLOAD" "$SLACK_WEBHOOK" 2>/dev/null && channels+=("slack") ||               echo "::warning::Slack notification failed (non-blocking)"
          fi
        fi

        # --- Discord (critical, high) ---
        if [ "$SEVERITY" = "critical" ] || [ "$SEVERITY" = "high" ]; then
          if [ -n "$DISCORD_WEBHOOK" ]; then
            case "$SEVERITY" in
              critical) ICON="🚨" ;;
              high)     ICON="⚠️" ;;
              *)        ICON="ℹ️" ;;
            esac
            PAYLOAD=$(jq -n               --arg content "$ICON **$TITLE**\n$MESSAGE"               '{content: $content}')
            curl -sS -X POST -H "Content-type: application/json"               --data "$PAYLOAD" "$DISCORD_WEBHOOK" 2>/dev/null && channels+=("discord") ||               echo "::warning::Discord notification failed (non-blocking)"
          fi
        fi

        # Join channels
        IFS=','; channels_sent="${channels[*]}"; IFS=' '

        {
          echo "channels-sent=$channels_sent"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::Notification sent to: ${channels_sent:-none} (severity: $SEVERITY)"
