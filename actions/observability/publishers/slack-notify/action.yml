name: "Slack Notify"
description: "Send Slack notification via incoming webhook."

inputs:
  webhook-url:
    description: "Slack incoming webhook URL"
    required: true
  title:
    description: "Message title"
    required: true
  message:
    description: "Message body"
    required: true
  status:
    description: "Status level: info, warning, critical"
    required: false
    default: "info"
  channel:
    description: "Slack channel (optional, overrides webhook default)"
    required: false
    default: ""

outputs:
  success:
    description: "Whether the notification was sent successfully"
    value: ${{ steps.notify.outputs.success }}

runs:
  using: "composite"
  steps:
    - id: notify
      shell: bash
      run: |
        set -euo pipefail

        WEBHOOK="${{ inputs.webhook-url }}"
        TITLE="${{ inputs.title }}"
        MESSAGE="${{ inputs.message }}"
        STATUS="${{ inputs.status }}"
        CHANNEL="${{ inputs.channel }}"

        if [ -z "$WEBHOOK" ]; then
          echo "::warning::No Slack webhook configured, skipping notification"
          echo "success=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Select color and emoji based on status
        case "$STATUS" in
          critical)
            COLOR="#FF0000"
            EMOJI=":rotating_light:"
            ;;
          warning)
            COLOR="#FFA500"
            EMOJI=":warning:"
            ;;
          info)
            COLOR="#36A64F"
            EMOJI=":information_source:"
            ;;
          *)
            COLOR="#808080"
            EMOJI=":bell:"
            ;;
        esac

        # Build Slack payload with Block Kit
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        PAYLOAD=$(jq -n \
          --arg emoji "$EMOJI" \
          --arg title "$TITLE" \
          --arg message "$MESSAGE" \
          --arg color "$COLOR" \
          --arg channel "$CHANNEL" \
          --arg timestamp "$TIMESTAMP" \
          '{
            blocks: [
              {
                type: "header",
                text: {
                  type: "plain_text",
                  text: "\($emoji) \($title)",
                  emoji: true
                }
              },
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: $message
                }
              },
              {
                type: "context",
                elements: [
                  {
                    type: "mrkdwn",
                    text: "_EvolveCI | \($timestamp)_"
                  }
                ]
              }
            ],
            attachments: [
              {
                color: $color,
                fallback: "\($title): \($message)"
              }
            ]
          }')

        # Add channel if specified
        if [ -n "$CHANNEL" ]; then
          PAYLOAD=$(echo "$PAYLOAD" | jq --arg ch "$CHANNEL" '. + {channel: $ch}')
        fi

        # Send to Slack
        HTTP_CODE=$(curl -sS -o /tmp/slack-response.txt -w "%{http_code}" \
          -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "$WEBHOOK" 2>/dev/null || echo "000")

        if [ "$HTTP_CODE" = "200" ]; then
          echo "::notice::Slack notification sent: $TITLE"
          echo "success=true" >> "$GITHUB_OUTPUT"
        else
          RESPONSE=$(cat /tmp/slack-response.txt 2>/dev/null || echo "unknown error")
          echo "::warning::Slack notification failed (HTTP $HTTP_CODE): $RESPONSE"
          echo "success=false" >> "$GITHUB_OUTPUT"
        fi
