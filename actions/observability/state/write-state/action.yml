name: "Write State"
description: "Dual-write state: local cache (fast) + _state orphan branch (persistent) with retry."

inputs:
  key:
    description: "Cache key"
    required: true
  state-path:
    description: "Path on _state branch"
    required: true
  value:
    description: "JSON value to write"
    required: true
  merge:
    description: "Whether to merge with existing value (jq deep merge)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - id: write
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        KEY="${{ inputs.key }}"
        STATE_PATH="${{ inputs.state-path }}"
        VALUE='${{ inputs.value }}'
        MERGE="${{ inputs.merge }}"
        CACHE_DIR=".state-cache"
        CACHE_FILE="$CACHE_DIR/data.json"
        MAX_ATTEMPTS=3
        RETRY_WAIT=5

        # Save the original branch/commit so we can restore it after writing to _state
        ORIGINAL_REF=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || git rev-parse HEAD)

        # Step 1: Write to local cache
        mkdir -p "$CACHE_DIR"
        echo "$VALUE" > "$CACHE_FILE"
        echo "::notice::Wrote $KEY to local cache"

        # Step 2: Write to _state branch with retry
        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          echo "::group::Attempt $attempt/$MAX_ATTEMPTS to write $STATE_PATH"

          # Fresh fetch + checkout
          git fetch origin _state --depth=1 2>/dev/null || true
          git checkout -B _state origin/_state 2>/dev/null || {
            # Branch doesn't exist yet — create orphan
            git checkout --orphan _state
            git rm -rf . 2>/dev/null || true
            git -c user.name="evolveCI bot" -c user.email="bot@evolveci.dev" \
              commit --allow-empty -m "init: CI observability state branch"
            git push origin _state
          }

          # Ensure directory exists
          mkdir -p "$(dirname "$STATE_PATH")"

          # Merge or overwrite
          if [ "$MERGE" = "true" ] && [ -f "$STATE_PATH" ]; then
            merged=$(echo "$VALUE" | jq -s '.[0] * .[1]' "$STATE_PATH" - 2>/dev/null || echo "$VALUE")
            echo "$merged" > "$STATE_PATH"
          else
            echo "$VALUE" > "$STATE_PATH"
          fi

          # Commit and push
          git add "$STATE_PATH"
          git -c user.name="evolveCI bot" -c user.email="bot@evolveci.dev" \
            commit -m "state: update $KEY" 2>/dev/null || true

          if git push origin _state 2>/dev/null; then
            echo "::notice::Wrote $KEY to _state branch"
            echo "::endgroup::"

            # Return to original branch/commit
            git checkout "$ORIGINAL_REF" 2>/dev/null || true
            exit 0
          fi

          echo "::warning::Push failed on attempt $attempt, retrying in ${RETRY_WAIT}s..."
          echo "::endgroup::"
          sleep "$RETRY_WAIT"
        done

        echo "::error::Failed to write $STATE_PATH after $MAX_ATTEMPTS attempts"
        git checkout "$ORIGINAL_REF" 2>/dev/null || true
        exit 1
