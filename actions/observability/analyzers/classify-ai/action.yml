name: "Classify AI"
description: "Tier 3/4: Prepare context for AI classification. Does NOT call AI directly."

inputs:
  log:
    description: "Plaintext log (redacted)"
    required: true
  workflow-name:
    description: "Name of the workflow"
    required: true
  failed-step:
    description: "Name of the failed step"
    required: false
    default: ""
  flakiness-score:
    description: "Historical flakiness score"
    required: false
    default: "0"
  repo:
    description: "Repository name (org/repo)"
    required: true
  run-id:
    description: "Run database ID"
    required: true
  tier:
    description: "Classification tier: 3 (Haiku) or 4 (Sonnet)"
    required: false
    default: "3"

outputs:
  context:
    description: "JSON context string for claude-harness"
    value: ${{ steps.prepare.outputs.context }}
  prompt-path:
    description: "Path to the prompt file"
    value: ${{ steps.prepare.outputs.prompt-path }}
  model:
    description: "Model to use"
    value: ${{ steps.prepare.outputs.model }}

runs:
  using: "composite"
  steps:
    - id: prepare
      shell: bash
      run: |
        set -euo pipefail

        LOG='${{ inputs.log }}'
        WORKFLOW="${{ inputs.workflow-name }}"
        FAILED_STEP="${{ inputs.failed-step }}"
        FLAKINESS="${{ inputs.flakiness-score }}"
        REPO="${{ inputs.repo }}"
        RUN_ID="${{ inputs.run-id }}"
        TIER="${{ inputs.tier }}"

        # Select model and prompt based on tier
        if [ "$TIER" = "4" ]; then
          model="glm-5.1"
          prompt_path="prompts/observability/classify-failure-sonnet.md"
          max_chars=32768
        else
          model="glm-5.1"
          prompt_path="prompts/observability/classify-failure-haiku.md"
          max_chars=8192
        fi

        # Truncate log to max_chars
        log_tail=$(echo "$LOG" | tail -c "$max_chars")

        # Escape for JSON embedding
        log_escaped=$(echo "$log_tail" | jq -Rs .)

        # Build context JSON
        context=$(jq -n \
          --arg workflow "$WORKFLOW" \
          --arg step "$FAILED_STEP" \
          --arg flakiness "$FLAKINESS" \
          --arg repo "$REPO" \
          --arg run_id "$RUN_ID" \
          --argjson log "$log_escaped" \
          '{
            workflow_name: $workflow,
            failed_step: $step,
            flakiness_score: ($flakiness | tonumber),
            repo: $repo,
            run_id: $run_id,
            log_tail: $log
          }')

        {
          echo "context<<EVOLVECI_EOF"
          echo "$context"
          echo "EVOLVECI_EOF"
          echo "prompt-path=$prompt_path"
          echo "model=$model"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::Prepared Tier $TIER context for $REPO/$WORKFLOW (model: $model)"
