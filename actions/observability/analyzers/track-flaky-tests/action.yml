name: "Track Flaky Tests"
description: "Extract failing test case names from logs and maintain a flaky test registry."

inputs:
  log:
    description: "Plaintext log (redacted)"
    required: true
  repo:
    description: "Repository name (org/repo)"
    required: true
  workflow-name:
    description: "Workflow name"
    required: true
  run-id:
    description: "Run database ID"
    required: true

outputs:
  new-flaky-tests:
    description: "JSON array of newly identified flaky tests"
    value: ${{ steps.track.outputs.new-flaky-tests }}
  flaky-count:
    description: "Number of flaky tests in registry for this repo"
    value: ${{ steps.track.outputs.flaky-count }}

runs:
  using: "composite"
  steps:
    - id: track
      shell: bash
      run: |
        set -euo pipefail

        LOG='${{ inputs.log }}'
        REPO="${{ inputs.repo }}"
        RUN_ID="${{ inputs.run-id }}"

        if [ -z "$LOG" ]; then
          echo "new-flaky-tests=[]" >> "$GITHUB_OUTPUT"
          echo "flaky-count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Extract test names from common test frameworks
        # pytest: FAILED tests/test_file.py::test_name
        # jest: FAIL src/test_file.test.ts
        # go test: --- FAIL: TestName (0.00s)
        test_names=()

        # pytest format
        while IFS= read -r line; do
          name=$(echo "$line" | sed -n "s/.*FAILED \(.*\)/\1/p" | xargs)
          [ -n "$name" ] && test_names+=("$name")
        done < <(echo "$LOG" | grep -i "FAILED.*::" || true)

        # go test format
        while IFS= read -r line; do
          name=$(echo "$line" | sed -n "s/.*--- FAIL: \(.*\)/\1/p" | xargs)
          [ -n "$name" ] && test_names+=("$name")
        done < <(echo "$LOG" | grep -i "--- FAIL:" || true)

        if [ ${#test_names[@]} -eq 0 ]; then
          echo "new-flaky-tests=[]" >> "$GITHUB_OUTPUT"
          echo "flaky-count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Deduplicate test names
        unique_tests=($(printf "%s\n" "${test_names[@]}" | sort -u))

        # Read existing registry from _state branch
        registry_file="/tmp/flaky-tests-${REPO//\//-}.json"
        if git show "origin/_state:flaky-tests/${REPO//\//-}.json" 2>/dev/null > "$registry_file"; then
          :
        else
          echo '{}' > "$registry_file"
        fi

        TODAY=$(date -u +%Y-%m-%d)
        new_flaky="[]"
        updated="$registry_file"

        for test_name in "${unique_tests[@]}"; do
          # Escape test name for jq
          existing=$(jq -r --arg t "$test_name" '.[$t] // empty' "$updated")

          if [ -n "$existing" ]; then
            # Update existing entry
            count=$(echo "$existing" | jq -r '.failure_count')
            new_count=$((count + 1))
            updated=$(jq --arg t "$test_name" --argjson c "$new_count" --arg d "$TODAY"               '.[$t].failure_count = $c | .[$t].last_seen = $d | .[$t].linked_runs += [$ENV.RUN_ID // ""]'               "$updated" 2>/dev/null || cat "$updated")
          else
            # Create new entry
            updated=$(jq --arg t "$test_name" --arg d "$TODAY" --arg r "$RUN_ID"               '.[$t] = {first_seen: $d, last_seen: $d, failure_count: 1, total_runs: 0, flakiness_rate: 0, status: "observing", linked_runs: [$r]}'               "$updated" 2>/dev/null || cat "$updated")
          fi

          # Check if test qualifies as flaky (>=3 failures)
          failure_count=$(jq -r --arg t "$test_name" '.[$t].failure_count // 0' "$updated")
          if [ "$failure_count" -ge 3 ]; then
            current_status=$(jq -r --arg t "$test_name" '.[$t].status // "observing"' "$updated")
            if [ "$current_status" != "flaky" ]; then
              updated=$(jq --arg t "$test_name" '.[$t].status = "flaky"' "$updated")
              new_flaky=$(echo "$new_flaky" | jq --arg t "$test_name" '. + [$t]')
            fi
          fi
        done

        flaky_count=$(jq '[.[] | select(.status == "flaky")] | length' "$updated")

        {
          echo "new-flaky-tests<<EVOLVECI_EOF"
          echo "$new_flaky"
          echo "EVOLVECI_EOF"
          echo "flaky-count=$flaky_count"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::Tracked ${#unique_tests[@]} test failures, $flaky_count total flaky tests"
