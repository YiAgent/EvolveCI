name: "Compute MTTR"
description: "Compute Mean Time To Recovery in minutes."

inputs:
  repo:
    description: "Repository name (org/repo)"
    required: true
  workflow-name:
    description: "Workflow name"
    required: true
  lookback:
    description: "Number of recent runs to analyze"
    required: false
    default: "50"
  token:
    description: "GitHub token"
    required: true

outputs:
  mttr-minutes:
    description: "MTTR in minutes"
    value: ${{ steps.compute.outputs.mttr-minutes }}
  recovery-count:
    description: "Number of failure->success transitions"
    value: ${{ steps.compute.outputs.recovery-count }}

runs:
  using: "composite"
  steps:
    - id: compute
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        REPO="${{ inputs.repo }}"
        WORKFLOW="${{ inputs.workflow-name }}"
        LOOKBACK="${{ inputs.lookback }}"

        # Fetch runs ordered by creation time
        runs=$(gh run list \
          --repo "$REPO" \
          --workflow "$WORKFLOW" \
          --limit "$LOOKBACK" \
          --json conclusion,createdAt \
          2>/dev/null || echo "[]")

        # Sort by createdAt ascending
        runs=$(echo "$runs" | jq 'sort_by(.createdAt)')

        # Find failure->success pairs and compute time deltas
        total_minutes=0
        recovery_count=0
        prev_conclusion=""
        prev_time=""

        while IFS= read -r line; do
          conclusion=$(echo "$line" | jq -r '.conclusion')
          created=$(echo "$line" | jq -r '.createdAt')

          if [ "$prev_conclusion" = "failure" ] && [ "$conclusion" = "success" ] && [ -n "$prev_time" ]; then
            # Compute delta in minutes
            prev_epoch=$(date -d "$prev_time" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$prev_time" +%s 2>/dev/null || echo 0)
            curr_epoch=$(date -d "$created" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$created" +%s 2>/dev/null || echo 0)

            if [ "$prev_epoch" -gt 0 ] && [ "$curr_epoch" -gt 0 ]; then
              delta=$(( (curr_epoch - prev_epoch) / 60 ))
              total_minutes=$((total_minutes + delta))
              recovery_count=$((recovery_count + 1))
            fi
          fi

          prev_conclusion="$conclusion"
          prev_time="$created"
        done < <(echo "$runs" | jq -c '.[]')

        if [ "$recovery_count" -eq 0 ]; then
          mttr=0
        else
          mttr=$((total_minutes / recovery_count))
        fi

        {
          echo "mttr-minutes=$mttr"
          echo "recovery-count=$recovery_count"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::MTTR: ${mttr}min ($recovery_count recoveries)"
