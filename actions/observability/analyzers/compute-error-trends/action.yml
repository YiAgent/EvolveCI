name: "Compute Error Trends"
description: "Analyze error fingerprints over time to find top errors, emerging patterns, and workflow instability."

inputs:
  lookback-days:
    description: "Number of days to look back"
    required: false
    default: "7"
  token:
    description: "GitHub token for API access"
    required: true

outputs:
  top-errors:
    description: "JSON array of top 10 errors by frequency"
    value: ${{ steps.trends.outputs.top-errors }}
  emerging-patterns:
    description: "JSON array of new patterns (first seen < 7 days, count >= 2)"
    value: ${{ steps.trends.outputs.emerging-patterns }}
  workflow-instability:
    description: "JSON array of top 5 most unstable workflows (by std dev)"
    value: ${{ steps.trends.outputs.workflow-instability }}

runs:
  using: "composite"
  steps:
    - id: trends
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        LOOKBACK="${{ inputs.lookback-days }}"
        TODAY=$(date -u +%Y-%m-%d)
        CUTOFF=$(date -u -d "$TODAY - $LOOKBACK days" +%Y-%m-%d 2>/dev/null ||                  date -u -v-${LOOKBACK}d +%Y-%m-%d 2>/dev/null ||                  echo "$TODAY")

        # Fetch _state branch
        git fetch origin _state --depth=1 2>/dev/null || true

        # --- Top Errors ---
        top_errors="[]"
        if git ls-tree --name-only origin/_state fingerprints/ 2>/dev/null > /dev/null; then
          # Read all fingerprint files
          top_errors=$(
            git ls-tree --name-only origin/_state fingerprints/ 2>/dev/null |             while IFS= read -r fp_file; do
              fp_id="${fp_file%.json}"
              git show "origin/_state:$fp_file" 2>/dev/null |                 jq --arg id "$fp_id" --arg cutoff "$CUTOFF"                 'select(.last_seen >= $cutoff) | {fingerprint: $id, count: .count, last_seen: .last_seen, category: .category}' 2>/dev/null
            done | jq -s 'sort_by(-.count) | .[0:10]' 2>/dev/null || echo "[]"
          )
        fi

        # --- Emerging Patterns ---
        emerging="[]"
        if git ls-tree --name-only origin/_state fingerprints/ 2>/dev/null > /dev/null; then
          seven_days_ago=$(date -u -d "$TODAY - 7 days" +%Y-%m-%d 2>/dev/null ||                           date -u -v-7d +%Y-%m-%d 2>/dev/null ||                           echo "$TODAY")
          emerging=$(
            git ls-tree --name-only origin/_state fingerprints/ 2>/dev/null |             while IFS= read -r fp_file; do
              fp_id="${fp_file%.json}"
              git show "origin/_state:$fp_file" 2>/dev/null |                 jq --arg id "$fp_id" --arg since "$seven_days_ago"                 'select(.first_seen >= $since and .count >= 2) | {fingerprint: $id, count: .count, first_seen: .first_seen, category: .category}' 2>/dev/null
            done | jq -s 'sort_by(-.count)' 2>/dev/null || echo "[]"
          )
        fi

        # --- Workflow Instability ---
        instability="[]"
        if git ls-tree --name-only origin/_state workflow-health/ 2>/dev/null > /dev/null; then
          instability=$(
            git ls-tree --name-only origin/_state workflow-health/ 2>/dev/null |             while IFS= read -r wf_file; do
              git show "origin/_state:$wf_file" 2>/dev/null |                 jq '.workflows // {} | to_entries[] | {
                  workflow: .key,
                  daily_values: (.value.daily // {} | to_entries | sort_by(.key) | .[-7:] | map(.value)),
                  avg_7day: (.value.daily // {} | to_entries | sort_by(.key) | .[-7:] | if length > 0 then (map(.value) | add / length) else 0 end)
                } | .std_dev = (
                  if (.daily_values | length) > 1 then
                    ((.daily_values | add / length) as $mean |
                     (.daily_values | map((. - $mean) * (. - $mean)) | add / length | sqrt))
                  else 0 end
                )' 2>/dev/null
            done | jq -s 'sort_by(-.std_dev) | .[0:5] | map({workflow, avg_7day: (.avg_7day | floor), std_dev: (.std_dev | floor * 100 / 100)})' 2>/dev/null || echo "[]"
          )
        fi

        {
          echo "top-errors<<EVOLVECI_EOF"
          echo "$top_errors"
          echo "EVOLVECI_EOF"
          echo "emerging-patterns<<EVOLVECI_EOF"
          echo "$emerging"
          echo "EVOLVECI_EOF"
          echo "workflow-instability<<EVOLVECI_EOF"
          echo "$instability"
          echo "EVOLVECI_EOF"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::Error trends computed: $(echo "$top_errors" | jq 'length') top errors, $(echo "$emerging" | jq 'length') emerging"
