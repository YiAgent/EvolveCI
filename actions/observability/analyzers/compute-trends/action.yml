name: "Compute Trends"
description: "Compute CI health trends based on historical snapshots."

inputs:
  repo:
    description: "Repository name"
    required: true
  workflow-name:
    description: "Workflow name (optional)"
    required: false
    default: ""
  lookback-days:
    description: "Days to look back"
    required: false
    default: "30"
  current-health-data:
    description: "Current health data JSON"
    required: true
  token:
    description: "GitHub token"
    required: true

outputs:
  trend:
    description: "Trend direction: improving, stable, degrading"
    value: ${{ steps.compute.outputs.trend }}
  delta:
    description: "Percentage point change"
    value: ${{ steps.compute.outputs.delta }}
  dora-section:
    description: "DORA metrics markdown placeholder"
    value: ${{ steps.compute.outputs.dora-section }}

runs:
  using: "composite"
  steps:
    - id: compute
      shell: bash
      run: |
        set -euo pipefail

        HEALTH_DATA='${{ inputs.current-health-data }}'

        if [ -z "$HEALTH_DATA" ] || [ "$HEALTH_DATA" = "{}" ]; then
          cat >> "$GITHUB_OUTPUT" <<EOF
        trend=stable
        delta=0
        dora-section=<!-- DORA metrics not available yet -->
        EOF
          exit 0
        fi

        # Extract recent 7 days average and 14-7 days ago average
        daily=$(echo "$HEALTH_DATA" | jq -r '.daily // {}')

        # Get today's date
        today=$(date -u +%Y-%m-%d)

        # Calculate 7-day average (recent)
        recent_sum=0
        recent_count=0
        for i in $(seq 0 6); do
          d=$(date -u -d "$today - $i days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d 2>/dev/null || echo "")
          if [ -n "$d" ]; then
            val=$(echo "$daily" | jq -r --arg d "$d" '.[$d] // empty')
            if [ -n "$val" ] && [ "$val" != "null" ]; then
              recent_sum=$((recent_sum + val))
              recent_count=$((recent_count + 1))
            fi
          fi
        done

        if [ "$recent_count" -gt 0 ]; then
          current_avg=$((recent_sum / recent_count))
        else
          current_avg=0
        fi

        # Calculate 14-7 days ago average (previous)
        prev_sum=0
        prev_count=0
        for i in $(seq 7 13); do
          d=$(date -u -d "$today - $i days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d 2>/dev/null || echo "")
          if [ -n "$d" ]; then
            val=$(echo "$daily" | jq -r --arg d "$d" '.[$d] // empty')
            if [ -n "$val" ] && [ "$val" != "null" ]; then
              prev_sum=$((prev_sum + val))
              prev_count=$((prev_count + 1))
            fi
          fi
        done

        if [ "$prev_count" -gt 0 ]; then
          prev_avg=$((prev_sum / prev_count))
        else
          prev_avg=0
        fi

        delta=$((current_avg - prev_avg))

        if [ "$delta" -gt 10 ]; then
          trend="degrading"
        elif [ "$delta" -lt -10 ]; then
          trend="improving"
        else
          trend="stable"
        fi

        {
          echo "trend=$trend"
          echo "delta=$delta"
          echo "dora-section<<EVOLVECI_EOF"
          echo "## DORA Metrics"
          echo "- Deployment Frequency: _pending integration_"
          echo "- Lead Time for Changes: _pending integration_"
          echo "- Change Failure Rate: ${current_avg}%"
          echo "- MTTR: _see compute-mttr output_"
          echo "EVOLVECI_EOF"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::Trend: $trend (delta: ${delta}pp)"
