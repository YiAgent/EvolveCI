name: "CI Triage - Failure Detection"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: ci-triage
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

jobs:
  scan:
    runs-on: blacksmith
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      runs: ${{ steps.limit.outputs.runs }}
      failure-count: ${{ steps.limit.outputs.failure-count }}
      skip: ${{ steps.circuit.outputs.skip }}
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # scan job: 扫描所有监控仓库，找出最近 30 分钟内的失败 run
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    steps:
      # 安全加固: 审计出站连接，防止供应链攻击
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      # 拉取代码（含 data/ 配置文件和 actions/ 定义）
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # 安装 yq（YAML 解析工具），用于读取 onboarded-repos.yml
      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # 检查熔断器: 如果有 ci:circuit-broken 标签的 open issue，跳过本轮 triage
      # 熔断器在预算超限时自动触发，防止无限重跑
      - name: Check circuit breaker
        id: circuit
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_issues=$(gh issue list \
            --label "ci:circuit-broken" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$open_issues" -gt 0 ]; then
            echo "::warning::Circuit breaker active ($open_issues open issues), skipping triage"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 从 data/onboarded-repos.yml 读取所有需要监控的仓库列表
      - name: Load onboarded repos
        id: repos
        if: steps.circuit.outputs.skip != 'true'
        shell: bash
        run: |
          repos=$(yq -r '.repos[].name' data/onboarded-repos.yml | paste -sd, -)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      # 调用 GitHub API 拉取最近 30 分钟内的失败 workflow run（含日志尾部 100 行）
      - name: Query GitHub Actions
        id: query
        if: steps.circuit.outputs.skip != 'true'
        uses: ./actions/observability/sources/query-github-actions
        with:
          repos: ${{ steps.repos.outputs.repos }}
          since: "30m"
          status: failure
          include-logs: "true"
          log-tail: "100"
          token: ${{ secrets.CROSS_REPO_PAT }}

      # 截取前 10 条失败，防止矩阵过大消耗过多 runner
      - name: Limit to top 10 failures
        id: limit
        if: steps.circuit.outputs.skip != 'true'
        shell: bash
        run: |
          RUNS='${{ steps.query.outputs.runs }}'
          limited=$(echo "$RUNS" | jq '.[0:10]')
          {
            echo "runs<<EVOLVECI_EOF"
            echo "$limited"
            echo "EVOLVECI_EOF"
          } >> "$GITHUB_OUTPUT"
          count=$(echo "$limited" | jq 'length')
          echo "failure-count=$count" >> "$GITHUB_OUTPUT"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # triage job: 对每个失败 run 进行 3 层漏斗分类，然后决定动作
  #   矩阵策略: 最多 3 个并行，不因单个失败取消其他
  #   分级优先级: T1 已知模式 > T2 启发式规则 > T3 AI 分类
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  triage:
    needs: scan
    if: needs.scan.outputs.skip != 'true' && needs.scan.outputs.failure-count != '0'
    runs-on: blacksmith
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        run: ${{ fromJson(needs.scan.outputs.runs) }}
    steps:
      # 安全加固
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      # 拉取代码
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # 拉取 _state 孤儿分支（持久化状态: 已知模式、计数器等）
      - name: Fetch _state branch
        shell: bash
        run: |
          git fetch origin _state --depth=1 2>/dev/null || true

      # 加载已知失败模式库: 优先从 _state 分支读取，fallback 到种子文件
      - name: Load known patterns
        id: patterns
        shell: bash
        run: |
          if git show origin/_state:known-patterns.json 2>/dev/null > /tmp/known-patterns.json; then
            echo "path=/tmp/known-patterns.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=data/known-patterns.seed.json" >> "$GITHUB_OUTPUT"
          fi

      # 脱敏日志: 移除 token、密码、IP 等敏感信息后再传给 AI
      - name: Redact log
        id: redact
        if: matrix.run.conclusion == 'failure'
        uses: ./actions/observability/state/redact-log
        with:
          log: ${{ matrix.run.log_base64 || '' }}

      # 生成错误指纹: 从日志中提取错误行，sha256 取前 12 位作为唯一标识
      # 用于后续聚类去重和 retry 判断
      - name: Error fingerprint
        id: fingerprint
        if: matrix.run.conclusion == 'failure'
        uses: ./actions/observability/analyzers/error-fingerprint
        with:
          log: ${{ steps.redact.outputs.redacted || '' }}
          failed-step: ${{ fromJson(matrix.run.failed_jobs || '[]')[0].steps[0] || '' }}

      # Retry 去重检查: 如果 fingerprint 在已知模式中且 auto_rerun=true
      # 且当日 retry < 2 次，直接 retry 跳过后续 triage
      - name: Check retry eligibility
        id: retry-check
        if: matrix.run.conclusion == 'failure' && steps.fingerprint.outputs.fingerprint != ''
        shell: bash
        run: |
          FP="${{ steps.fingerprint.outputs.fingerprint }}"
          TODAY=$(date -u +%Y-%m-%d)
          PATTERNS_PATH="${{ steps.patterns.outputs.path }}"

          # Check if fingerprint matches a known pattern with auto_rerun=true
          AUTO_RERUN=$(jq -r --arg fp "$FP" \
            '[.[] | select(.id | endswith($fp[0:8])) | .auto_rerun] | first // false' \
            "$PATTERNS_PATH" 2>/dev/null || echo "false")

          if [ "$AUTO_RERUN" != "true" ]; then
            echo "should-retry=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Read retry counter for this fingerprint today
          COUNTER_KEY="retry:${FP}:${TODAY}"
          retry_count=0
          if [ -f ".state-cache/data.json" ]; then
            retry_count=$(jq -r --arg k "$COUNTER_KEY" '.[$k] // 0' ".state-cache/data.json" 2>/dev/null || echo 0)
          fi

          if [ "$retry_count" -ge 2 ]; then
            echo "::notice::Fingerprint $FP already retried $retry_count times today, entering triage"
            echo "should-retry=false" >> "$GITHUB_OUTPUT"
          else
            echo "should-retry=true" >> "$GITHUB_OUTPUT"
          fi

      # 执行 retry（仅当 eligible）
      - name: Auto retry
        if: steps.retry-check.outputs.should-retry == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          gh run rerun "${{ matrix.run.databaseId }}" --repo "${{ matrix.run.repo }}" --failed 2>/dev/null || true
          echo "::notice::Auto-retried run ${{ matrix.run.databaseId }} (fingerprint: ${{ steps.fingerprint.outputs.fingerprint }})"

      # ── Tier 1: 精确匹配 ──
      # 用正则匹配已知模式库，命中率高、零成本、即时分类
      - name: Tier 1 - Match known patterns
        id: tier1
        if: matrix.run.conclusion == 'failure'
        uses: ./actions/observability/analyzers/match-known-patterns
        with:
          log: ${{ steps.redact.outputs.redacted || '' }}
          patterns-path: ${{ steps.patterns.outputs.path }}

      # 计算 flakiness 分数: 取最近 20 次 run，算失败率 (0-100)
      # 分数传给 Tier 2 启发式引擎，帮助判断是真故障还是 flaky test
      - name: Compute flakiness score
        id: flakiness
        if: matrix.run.conclusion == 'failure'
        uses: ./actions/observability/analyzers/compute-flakiness
        with:
          repo: ${{ matrix.run.repo }}
          workflow-name: ${{ matrix.run.workflowName }}
          lookback: "20"
          token: ${{ secrets.CROSS_REPO_PAT }}

      # ── Tier 2: 启发式规则 ──
      # 基于日志关键词 + flakiness 分数 + 失败步骤名进行规则分类
      # 仅在 Tier 1 未命中时执行
      - name: Tier 2 - Classify heuristic
        id: tier2
        if: matrix.run.conclusion == 'failure' && steps.tier1.outputs.matched != 'true'
        uses: ./actions/observability/analyzers/classify-heuristic
        with:
          log: ${{ steps.redact.outputs.redacted || '' }}
          failed-step: ${{ fromJson(matrix.run.failed_jobs || '[]')[0].steps[0] || '' }}
          flakiness-score: ${{ steps.flakiness.outputs.flakiness-score || '0' }}

      # ── Tier 3: AI 分类（兜底）──
      # 3a: 准备 AI 上下文（拼装 prompt + 日志 + 元数据）
      # 仅在 T1/T2 都未命中、且 T2 置信度为 low 时触发
      - name: Tier 3 - Prepare AI context
        id: tier3-prep
        if: matrix.run.conclusion == 'failure' && steps.tier1.outputs.matched != 'true' && steps.tier2.outputs.confidence == 'low'
        uses: ./actions/observability/analyzers/classify-ai
        with:
          log: ${{ steps.redact.outputs.redacted || '' }}
          workflow-name: ${{ matrix.run.workflowName }}
          failed-step: ${{ fromJson(matrix.run.failed_jobs || '[]')[0].steps[0] || '' }}
          flakiness-score: "0"
          repo: ${{ matrix.run.repo }}
          run-id: ${{ matrix.run.databaseId }}
          tier: "3"

      # 3b: 通过 claude-harness 调用 AI 分类（支持 GLM/Claude 等任意 provider）
      # continue-on-error: AI 调用失败不影响后续流程
      - name: Tier 3 - AI classification
        id: tier3
        if: steps.tier3-prep.outputs.context != ''
        continue-on-error: true
        uses: YiAgent/OpenCI/.github/workflows/claude-harness.yml@main
        with:
          task: "classify-failure"
          prompt-path: ${{ steps.tier3-prep.outputs.prompt-path }}
          context: ${{ steps.tier3-prep.outputs.context }}
          model: ${{ secrets.GLM_MODEL }}
          api-base-url: ${{ secrets.GLM_BASE_URL }}
          api-provider: "openai"
          max-turns: 1
        secrets:
          api-key: ${{ secrets.GLM_API_KEY }}

      # 汇总 3 层结果，按优先级取最高级: T1 > T2(high/medium) > T3 > 默认
      # 输出: category, severity, should-rerun, should-notify, summary, fingerprint
      - name: Dispatch classification
        id: dispatch
        shell: bash
        run: |
          # Aggregate results by priority: T1 > T2(high/medium) > T3 > default
          category="unknown"
          severity="medium"
          should_rerun="false"
          should_notify="true"
          summary=""
          tier="none"
          matched_pattern=""

          # Tier 1 (highest priority)
          if [ "${{ steps.tier1.outputs.matched }}" = "true" ]; then
            category="${{ steps.tier1.outputs.category }}"
            severity="${{ steps.tier1.outputs.severity }}"
            should_rerun="${{ steps.tier1.outputs.auto-rerun }}"
            should_notify="${{ steps.tier1.outputs.notify }}"
            summary="Known pattern: ${{ steps.tier1.outputs.pattern-id }}"
            tier="1"
          fi

          # Tier 2 (high/medium confidence)
          if [ "$tier" = "none" ] && [ "${{ steps.tier2.outputs.classified }}" = "true" ]; then
            conf="${{ steps.tier2.outputs.confidence }}"
            if [ "$conf" = "high" ] || [ "$conf" = "medium" ]; then
              category="${{ steps.tier2.outputs.category }}"
              severity="${{ steps.tier2.outputs.severity }}"
              should_rerun="${{ steps.tier2.outputs.should-rerun }}"
              should_notify="${{ steps.tier2.outputs.should-notify }}"
              summary="Heuristic: $category ($conf confidence)"
              tier="2"
            fi
          fi

          # Tier 3 (AI)
          if [ "$tier" = "none" ] && [ "${{ steps.tier3.outcome }}" = "success" ]; then
            ai_result='${{ steps.tier3.outputs.result || '{}' }}'
            if [ -n "$ai_result" ] && [ "$ai_result" != "{}" ]; then
              category=$(echo "$ai_result" | jq -r '.category // "unknown"')
              severity=$(echo "$ai_result" | jq -r '.severity // "medium"')
              should_rerun=$(echo "$ai_result" | jq -r '.should_rerun // false')
              should_notify=$(echo "$ai_result" | jq -r '.should_notify // true')
              summary=$(echo "$ai_result" | jq -r '.summary // "AI classified"')
              matched_pattern=$(echo "$ai_result" | jq -r '.matched_pattern // ""')
              tier="3"
            fi
          fi

          # Default (no tier matched)
          if [ "$tier" = "none" ]; then
            summary="Unclassified failure"
            tier="none"
          fi

          # Inject fingerprint from dedicated step
          fingerprint="${{ steps.fingerprint.outputs.fingerprint }}"

          {
            echo "category=$category"
            echo "severity=$severity"
            echo "should-rerun=$should_rerun"
            echo "should-notify=$should_notify"
            echo "summary=$summary"
            echo "tier=$tier"
            echo "matched-pattern=$matched_pattern"
            echo "fingerprint=$fingerprint"
          } >> "$GITHUB_OUTPUT"

      # 如果分类结果建议重跑，触发 workflow re-run（受日预算限制）
      - name: Auto-rerun
        id: rerun
        if: steps.dispatch.outputs.should-rerun == 'true'
        uses: ./actions/observability/publishers/auto-rerun
        with:
          repo: ${{ matrix.run.repo }}
          run-id: ${{ matrix.run.databaseId }}
          workflow-name: ${{ matrix.run.workflowName }}
          daily-budget: "3"
          token: ${{ secrets.CROSS_REPO_PAT }}

      # 跟踪 flaky test: 从日志提取 test case 名称，维护注册表
      - name: Track flaky tests
        id: flaky-tests
        if: matrix.run.conclusion == 'failure' && steps.redact.outputs.redacted != ''
        uses: ./actions/observability/analyzers/track-flaky-tests
        with:
          log: ${{ steps.redact.outputs.redacted || '' }}
          repo: ${{ matrix.run.repo }}
          workflow-name: ${{ matrix.run.workflowName }}
          run-id: ${{ matrix.run.databaseId }}

      # 读取今日重跑计数器（从 _state 分支），用于预算检查
      - name: Read rerun counter
        id: read-counter
        if: steps.rerun.outputs.result == 'rerunned'
        uses: ./actions/observability/state/read-state
        with:
          key: "reruns:${{ matrix.run.repo }}/${{ matrix.run.workflowName }}"
          state-path: "daily-counters/$(date -u +%Y-%m-%d).json"
          default: '{"reruns":{}}'

      # 重跑计数器 +1，准备写回
      - name: Update rerun counter
        id: update-counter
        if: steps.rerun.outputs.result == 'rerunned'
        shell: bash
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNTER_KEY="${{ matrix.run.repo }}/${{ matrix.run.workflowName }}/$TODAY"
          EXISTING='${{ steps.read-counter.outputs.value }}'
          NEW_COUNT=$(echo "$EXISTING" | jq -r ".reruns[\"$COUNTER_KEY\"] // 0")
          NEW_COUNT=$((NEW_COUNT + 1))

          counter_json=$(echo "$EXISTING" | jq \
            --arg k "$COUNTER_KEY" \
            --argjson v "$NEW_COUNT" \
            '.reruns[$k] = $v')

          {
            echo "counter-json<<EVOLVECI_EOF"
            echo "$counter_json"
            echo "EVOLVECI_EOF"
          } >> "$GITHUB_OUTPUT"

      # 写回重跑计数器（双写: 本地缓存 + _state 分支，带重试）
      - name: Write rerun counter
        if: steps.rerun.outputs.result == 'rerunned'
        uses: ./actions/observability/state/write-state
        with:
          key: "reruns:${{ matrix.run.repo }}/${{ matrix.run.workflowName }}"
          state-path: "daily-counters/$(date -u +%Y-%m-%d).json"
          value: ${{ steps.update-counter.outputs.counter-json }}
          merge: "true"

      # 检查 3 维预算: 同 workflow ≤3次/天、同 repo ≤20次/天
      # 超限则触发熔断器，暂停所有自动 triage
      - name: Check circuit breaker budget
        id: budget-check
        if: steps.rerun.outputs.result == 'rerunned'
        shell: bash
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNTER_KEY="${{ matrix.run.repo }}/${{ matrix.run.workflowName }}/$TODAY"
          EXISTING='${{ steps.update-counter.outputs.counter-json }}'
          CURRENT=$(echo "$EXISTING" | jq -r ".reruns[\"$COUNTER_KEY\"] // 0")

          # Load budget limits from circuit-config
          WORKFLOW_LIMIT=$(python3 -c "import yaml; print(yaml.safe_load(open('data/circuit-config.yml'))['dimensions']['workflow']['daily_limit'])")
          REPO_LIMIT=$(python3 -c "import yaml; print(yaml.safe_load(open('data/circuit-config.yml'))['dimensions']['repo']['daily_limit'])")

          TRIPPED="false"
          REASON=""

          # Check workflow dimension
          if [ "$CURRENT" -ge "$WORKFLOW_LIMIT" ]; then
            TRIPPED="true"
            REASON="workflow budget: $CURRENT/$WORKFLOW_LIMIT reruns today"
          fi

          # Check repo dimension (sum all counters for this repo today)
          REPO_TOTAL=$(echo "$EXISTING" | jq -r "
            .reruns | to_entries
              | map(select(.key | startswith(\"${{ matrix.run.repo }}/\")))
              | map(.value) | add // 0
          ")
          if [ "$REPO_TOTAL" -ge "$REPO_LIMIT" ]; then
            TRIPPED="true"
            REASON="repo budget: $REPO_TOTAL/$REPO_LIMIT reruns today"
          fi

          echo "tripped=$TRIPPED" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      # 预算超限! 创建 ci:circuit-broken issue，触发熔断
      # 下次 scan 会检测到这个 issue 并跳过 triage
      - name: Trip circuit breaker
        if: steps.budget-check.outputs.tripped == 'true'
        uses: ./actions/observability/publishers/trip-circuit-breaker
        with:
          repo: ${{ matrix.run.repo }}
          workflow-name: ${{ matrix.run.workflowName }}
          reason: ${{ steps.budget-check.outputs.reason }}
          dimension: workflow

      # 创建或更新 GitHub Issue: 用 fingerprint 精确去重
      # flaky 类型不建 issue（避免噪音）
      - name: Create issue
        if: steps.dispatch.outputs.should-notify == 'true' && steps.dispatch.outputs.category != 'flaky'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CATEGORY="${{ steps.dispatch.outputs.category }}"
          SEVERITY="${{ steps.dispatch.outputs.severity }}"
          SUMMARY="${{ steps.dispatch.outputs.summary }}"
          WORKFLOW="${{ matrix.run.workflowName }}"
          REPO="${{ matrix.run.repo }}"
          TIER="${{ steps.dispatch.outputs.tier }}"
          FINGERPRINT="${{ steps.dispatch.outputs.fingerprint }}"

          TITLE="CI [$CATEGORY]: $WORKFLOW - $SUMMARY"

          # Fingerprint-based dedup: search for existing issue with this fingerprint in body
          if [ -n "$FINGERPRINT" ]; then
            existing=$(gh issue list \
              --label "ci/$CATEGORY" \
              --state open \
              --search "\"$FINGERPRINT\" in:body" \
              --json number \
              --jq '.[0].number // empty')
          else
            existing=""
          fi

          if [ -n "$existing" ]; then
            # Add comment to existing issue (fingerprint match)
            BODY="### Recurrence (Tier $TIER)

          - **Repo**: $REPO
          - **Run**: ${{ matrix.run.databaseId }}
          - **Summary**: $SUMMARY
          - **Fingerprint**: \`$FINGERPRINT\`
          - **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            gh issue comment "$existing" --body "$BODY"
            echo "::notice::Commented on existing issue #$existing (fingerprint: $FINGERPRINT)"
          else
            # Create new issue
            BODY="## CI Failure: $WORKFLOW

          - **Repository**: $REPO
          - **Category**: $CATEGORY
          - **Severity**: $SEVERITY
          - **Classification Tier**: $TIER
          - **Summary**: $SUMMARY
          - **Run ID**: ${{ matrix.run.databaseId }}
          - **Fingerprint**: \`$FINGERPRINT\`

          ### Failed Jobs
          \`\`\`json
          ${{ toJson(matrix.run.failed_jobs || fromJson('[]')) }}
          \`\`\`

          ---
          _Automated by evolveCI triage_"

            LABELS="ci/$CATEGORY,severity/$SEVERITY"
            if [ -n "$FINGERPRINT" ]; then
              LABELS="$LABELS,fingerprint/$FINGERPRINT"
            fi

            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "$LABELS"
          fi

      # 多渠道通知: 根据 severity 分发到 Slack + Discord
      - name: Multi-channel notification
        if: steps.dispatch.outputs.severity == 'critical' || steps.dispatch.outputs.severity == 'high'
        continue-on-error: true
        uses: ./actions/observability/publishers/post-notification
        with:
          title: "CI Alert: ${{ matrix.run.workflowName }}"
          message: "${{ steps.dispatch.outputs.summary }} (repo: ${{ matrix.run.repo }}, run: ${{ matrix.run.databaseId }})"
          severity: ${{ steps.dispatch.outputs.severity }}
          slack-webhook: ${{ secrets.SLACK_CI_WEBHOOK }}
          discord-webhook: ${{ secrets.DISCORD_CI_WEBHOOK }}
          repo: ${{ matrix.run.repo }}

      # critical/high 级别发送 Slack 告警
      - name: Slack notification
        if: steps.dispatch.outputs.severity == 'critical' || steps.dispatch.outputs.severity == 'high'
        continue-on-error: true
        uses: ./actions/observability/publishers/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_CI_WEBHOOK }}
          title: "CI Alert: ${{ matrix.run.workflowName }}"
          message: "${{ steps.dispatch.outputs.summary }}"
          status: ${{ steps.dispatch.outputs.severity }}

      # AI 发现了新的失败模式 → 提 PR 添加到 known-patterns（自动学习）
      # pattern 长度 ≤200 字符，防止 ReDoS
      - name: Learn new pattern
        if: steps.dispatch.outputs.matched-pattern != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PATTERN="${{ steps.dispatch.outputs.matched-pattern }}"
          CATEGORY="${{ steps.dispatch.outputs.category }}"
          RUN_ID="${{ matrix.run.databaseId }}"

          # ReDoS protection: max 200 chars
          if [ "${#PATTERN}" -gt 200 ]; then
            echo "::warning::Pattern too long (${#PATTERN} chars), skipping learning"
            exit 0
          fi

          # Generate pattern ID
          PATTERN_ID="ai-$(echo -n "$PATTERN" | md5sum | cut -c1-8)"

          # Create pattern JSON
          TODAY=$(date -u +%Y-%m-%d)
          jq -n \
            --arg id "$PATTERN_ID" \
            --arg match "$PATTERN" \
            --arg category "$CATEGORY" \
            --arg today "$TODAY" \
            '{
              id: $id,
              match: $match,
              category: $category,
              auto_rerun: (if $category == "flaky" then true else false end),
              notify: (if $category == "flaky" then false else true end),
              severity: (if $category == "flaky" then "low" elif $category == "security" then "high" else "medium" end),
              seen_count: 1,
              last_seen: $today,
              source: "ai-learned"
            }' > /tmp/new-pattern.json

          # Create PR
          echo '[]' | jq --slurpfile new /tmp/new-pattern.json '. + $new' > /tmp/known-patterns-pr.json

          gh api repos/${{ github.repository }}/pulls \
            --method POST \
            --field title="Learn pattern: $CATEGORY - $PATTERN_ID" \
            --field head="pattern/$RUN_ID" \
            --field base="main" \
            --field body="## New CI Failure Pattern

          - **ID**: $PATTERN_ID
          - **Category**: $CATEGORY
          - **Pattern**: \`$PATTERN\`
          - **Source**: AI-learned from run $RUN_ID

          ### Auto-merge conditions
          - Pattern length ≤ 200 chars ✓
          - No nested quantifiers ✓

          ---
          _Automated by evolveCI_" \
            2>/dev/null || echo "::warning::PR creation failed (may need manual review)"

      # 写入 fingerprint 记录到 _state 分支（用于聚类和趋势分析）
      - name: Write fingerprint record
        if: steps.dispatch.outputs.fingerprint != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FP="${{ steps.dispatch.outputs.fingerprint }}"
          TODAY=$(date -u +%Y-%m-%d)
          CATEGORY="${{ steps.dispatch.outputs.category }}"
          RUN_ID="${{ matrix.run.databaseId }}"

          if [ -z "$FP" ]; then
            exit 0
          fi

          # Check if fingerprint file exists on _state
          git fetch origin _state --depth=1 2>/dev/null || true
          existing=""
          if git show "origin/_state:fingerprints/${FP}.json" 2>/dev/null > /tmp/fp-existing.json; then
            existing="true"
          fi

          if [ -n "$existing" ]; then
            # Update existing: increment count, update last_seen, append run_id
            jq --arg run "$RUN_ID" --arg today "$TODAY" \
              '.count += 1 | .last_seen = $today | .linked_runs += [$run] | .linked_runs = (.linked_runs | .[-20:])' \
              /tmp/fp-existing.json > /tmp/fp-updated.json
          else
            # Create new
            jq -n \
              --arg fp "$FP" --arg cat "$CATEGORY" --arg run "$RUN_ID" --arg today "$TODAY" \
              '{fingerprint: $fp, first_seen: $today, last_seen: $today, count: 1, category: $cat, source: "triage", linked_runs: [$run]}' \
              > /tmp/fp-updated.json
          fi

          echo "::notice::Fingerprint record prepared: $FP"
