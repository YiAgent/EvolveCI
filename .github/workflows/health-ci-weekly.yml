name: "CI Health - Weekly Deep Dive"

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-health-weekly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  collect:
    runs-on: blacksmith
    timeout-minutes: 20
    outputs:
      weekly-data: ${{ steps.aggregate.outputs.weekly-data }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Load onboarded repos
        id: repos
        shell: bash
        run: |
          repos=$(yq -r '.repos[].name' data/onboarded-repos.yml | paste -sd, -)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      - name: Query GitHub Actions
        id: query
        uses: ./actions/observability/sources/query-github-actions
        with:
          repos: ${{ steps.repos.outputs.repos }}
          since: "7d"
          status: all
          include-logs: "false"
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Compute weekly stats
        id: stats
        shell: bash
        run: |
          RUNS='${{ steps.query.outputs.runs }}'

          # Write jq filter to file to avoid quoting issues
          cat > /tmp/weekly-stats.jq << 'JQEOF'
          group_by(.repo) |
          map({
            repo: .[0].repo,
            total: length,
            failed: [.[] | select(.conclusion == "failure")] | length,
            success: [.[] | select(.conclusion == "success")] | length,
            workflows: (
              group_by(.workflowName) |
              map({
                name: .[0].workflowName,
                total: length,
                failed: [.[] | select(.conclusion == "failure")] | length,
                failure_rate: (if length > 0 then (([.[] | select(.conclusion == "failure")] | length) * 100 / length | floor) else 0 end)
              })
            )
          })
          JQEOF

          repo_stats=$(echo "$RUNS" | jq -f /tmp/weekly-stats.jq)

          echo "repo_stats<<EVOLVECI_EOF" >> "$GITHUB_OUTPUT"
          echo "$repo_stats" >> "$GITHUB_OUTPUT"
          echo "EVOLVECI_EOF" >> "$GITHUB_OUTPUT"

      - name: Read previous snapshot
        id: previous
        shell: bash
        run: |
          # Get last week's ISO week number
          last_week=$(date -u -d "7 days ago" +%Y-W%V 2>/dev/null || date -u -v-7d +%Y-W%V 2>/dev/null || echo "")
          this_week=$(date -u +%Y-W%V)

          if [ -n "$last_week" ]; then
            git fetch origin _state --depth=1 2>/dev/null || true
            previous=$(git show "origin/_state:weekly-snapshots/$last_week.json" 2>/dev/null || echo "{}")
          else
            previous="{}"
          fi

          echo "this-week=$this_week" >> "$GITHUB_OUTPUT"
          echo "previous<<EVOLVECI_EOF" >> "$GITHUB_OUTPUT"
          echo "$previous" >> "$GITHUB_OUTPUT"
          echo "EVOLVECI_EOF" >> "$GITHUB_OUTPUT"

      - name: Save current snapshot
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          THIS_WEEK="${{ steps.previous.outputs.this-week }}"
          STATS='${{ steps.stats.outputs.repo_stats }}'

          snapshot=$(jq -n \
            --arg week "$THIS_WEEK" \
            --arg date "$(date -u +%Y-%m-%d)" \
            --argjson repos "$STATS" \
            '{week: $week, date: $date, repos: $repos}')

          echo "$snapshot" > /tmp/weekly-snapshot.json

          # Write to _state branch
          git fetch origin _state --depth=1 2>/dev/null || true
          git checkout -B _state origin/_state 2>/dev/null || {
            git checkout --orphan _state
            git rm -rf . 2>/dev/null || true
            git -c user.name="evolveCI bot" -c user.email="bot@evolveci.dev" \
              commit --allow-empty -m "init: CI observability state branch"
          }

          mkdir -p weekly-snapshots
          echo "$snapshot" > "weekly-snapshots/$THIS_WEEK.json"
          git add "weekly-snapshots/$THIS_WEEK.json"
          git -c user.name="evolveCI bot" -c user.email="bot@evolveci.dev" \
            commit -m "state: add weekly snapshot $THIS_WEEK" || true
          git push origin _state 2>/dev/null || echo "::warning::Failed to push weekly snapshot"

          git checkout - 2>/dev/null || true

      - name: Aggregate output
        id: aggregate
        shell: bash
        run: |
          current=$(jq -n \
            --arg week "${{ steps.previous.outputs.this-week }}" \
            --arg date "$(date -u +%Y-%m-%d)" \
            --argjson repos '${{ steps.stats.outputs.repo_stats }}' \
            '{week: $week, date: $date, repos: $repos}')

          {
            echo "weekly-data<<EVOLVECI_EOF"
            jq -n \
              --argjson current "$current" \
              --argjson previous '${{ steps.previous.outputs.previous }}' \
              '{current: $current, previous: $previous}'
            echo "EVOLVECI_EOF"
          } >> "$GITHUB_OUTPUT"

  synthesize:
    needs: collect
    if: needs.collect.outputs.weekly-data != '' && needs.collect.outputs.weekly-data != '{}'
    runs-on: blacksmith
    timeout-minutes: 5
    outputs:
      result: ${{ steps.ai.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: AI synthesis
        id: ai
        uses: ./actions/observability/analyzers/call-glm
        with:
          prompt-path: "prompts/observability/weekly-deep-dive.md"
          context: ${{ needs.collect.outputs.weekly-data }}
          api-key: ${{ secrets.GLM_API_KEY }}
          base-url: ${{ secrets.GLM_BASE_URL }}
          model: ${{ secrets.GLM_MODEL }}

  publish:
    needs: synthesize
    if: needs.synthesize.outputs.result != ''
    runs-on: blacksmith
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Write report
        shell: bash
        env:
          REPORT: ${{ needs.synthesize.outputs.result }}
        run: |
          printf '%s' "$REPORT" > /tmp/weekly-report.md

      - name: Set date
        id: date
        shell: bash
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Post issue report
        uses: ./actions/observability/publishers/post-issue-report
        with:
          title: "CI Weekly Deep Dive - ${{ steps.date.outputs.week }}"
          report-path: /tmp/weekly-report.md
          labels: "weekly-report,ci-health"

      - name: Post Slack report
        continue-on-error: true
        uses: ./actions/observability/publishers/post-slack-report
        env:
          REPORT_MSG: ${{ needs.synthesize.outputs.result }}
        with:
          webhook-url: ${{ secrets.SLACK_CI_WEBHOOK }}
          title: "CI Weekly Deep Dive - ${{ steps.date.outputs.week }}"
          message: ${{ env.REPORT_MSG }}
          status: info
