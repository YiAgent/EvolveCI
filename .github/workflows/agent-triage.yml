# /triage — every 15 min, plus manual workflow_dispatch.
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
# permissions are scoped per-job (least privilege). The reusable-workflow
# call needs a superset of _call-harness.yml; the data collector only needs
# read access.
name: "Agent — CI Triage"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      prompt:
        description: "Override slash command (default: /triage)."
        required: false
        default: ""

concurrency:
  group: agent-triage
  cancel-in-progress: false

permissions: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      actions: read    # gh run list
      issues: read     # gh issue list (pattern / circuit)
    outputs:
      context: ${{ steps.data.outputs.context }}
    steps:
      - uses: actions/checkout@v4

      # Phase 1: 确定性数据收集（零 AI 成本，~30s）
      # 脚本查询所有监控仓库的失败 runs，做 pattern 匹配和启发式分类，
      # 输出结构化 JSON，agent 直接消费。
      - name: Collect triage data
        id: data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/collect-triage-data.sh 30m > /tmp/triage-context.json
          # 注入为 step output（多行用 delimiter）
          echo "context<<TRIAGE_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/triage-context.json >> "$GITHUB_OUTPUT"
          echo "TRIAGE_EOF" >> "$GITHUB_OUTPUT"

  triage:
    needs: collect
    permissions:
      contents: write       # Claude commits memory updates back to main
      issues: write         # triage issues
      pull-requests: write  # sticky comments
      actions: read         # CI MCP queries
      id-token: write       # harden-runner
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: triage
      prompt: |-
        ${{ inputs.prompt || '/triage' }}
        ---
        DATA_CONTEXT:
        ${{ needs.collect.outputs.context }}
      max-turns: 15
      timeout-minutes: 10
      extra-allowed-tools: "Bash(bash lib/redact-log.sh),Bash(bash lib/),Bash(cut),Bash(tr)"
    secrets: inherit
