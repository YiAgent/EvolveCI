# /triage — every 15 min, plus manual workflow_dispatch.
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
# permissions MUST be declared here too (GitHub requires the calling job to
# pre-grant a superset of what the called workflow requests; superset cannot
# be inherited through workflow_call).
name: "Agent — CI Triage"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      prompt:
        description: "Override slash command (default: /triage)."
        required: false
        default: ""

concurrency:
  group: agent-triage
  cancel-in-progress: false

permissions:
  contents: write       # commit memory updates
  issues: write         # triage issues
  pull-requests: write  # sticky comments
  actions: read         # CI MCP queries
  id-token: write       # harden-runner

jobs:
  triage:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: triage
      prompt: ${{ inputs.prompt || '/triage' }}
      max-turns: 30
      timeout-minutes: 20
      # Triage runs the log-redaction shell script on raw CI logs.
      extra-allowed-tools: "Bash(bash lib/redact-log.sh),Bash(bash lib/),Bash(cut),Bash(tr)"
    secrets: inherit
