# /triage — every 15 min, plus manual workflow_dispatch.
#
# Architecture (v5.1 agent-when-needed):
#   The agent's first step is `python3 scripts/build-triage-input.py` which
#   does ALL data collection and Tier 1/2 classification deterministically.
#   The agent then ingests the JSON output and only does Tier 3 reasoning on
#   entries flagged needs_tier3=true. Saves ~80% of turns vs v5.0.
#
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
name: "Agent — CI Triage"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      prompt:
        description: "Override slash command (default: /triage)."
        required: false
        default: ""

concurrency:
  group: agent-triage
  cancel-in-progress: false

permissions:
  contents: write       # commit memory updates
  issues: write         # triage issues
  pull-requests: write  # sticky comments
  actions: read         # CI MCP queries
  id-token: write       # harden-runner

jobs:
  triage:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: triage
      prompt: ${{ inputs.prompt || '/triage' }}
      # Tier 3 path only — preprocessor handles everything else.
      max-turns: 15
      timeout-minutes: 15
      extra-allowed-tools: "Bash(python3 scripts/build-triage-input.py),Bash(jq),Bash(bash lib/redact-log.sh),Bash(bash lib/),Bash(cut),Bash(tr),Bash(pip install --user pyyaml),Bash(python3 -m pip install --user pyyaml)"
    secrets: inherit
