# /weekly-report — every Monday UTC 02:00.
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
# permissions MUST be declared here too (GitHub requires the calling job to
# pre-grant a superset of what the called workflow requests; superset cannot
# be inherited through workflow_call).
name: "Agent — CI Weekly Deep Dive"

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: agent-weekly
  cancel-in-progress: false

permissions:
  contents: write       # commit memory updates
  issues: write         # triage issues
  pull-requests: write  # sticky comments
  actions: read         # CI MCP queries
  id-token: write       # harden-runner

jobs:
  weekly:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: weekly-report
      prompt: /weekly-report
      # v5.1: collector script does aggregation + DORA + MTTR; agent only
      # renders prose and opens the PR via weekly-pr.sh.
      max-turns: 30
      timeout-minutes: 30
      extra-allowed-tools: "Bash(python3 scripts/collect-weekly.py),Bash(bash scripts/weekly-pr.sh),Bash(jq),Bash(date),Bash(gh issue list),Bash(pip install --user pyyaml),Bash(python3 -m pip install --user pyyaml)"
    secrets: inherit
