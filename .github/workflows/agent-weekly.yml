# /weekly-report — every Monday UTC 02:00.
#
# Architecture (v5.1 agent-when-needed):
#   1) collect: Python collector aggregates 7d data + DORA + MTTR p50/p95
#      + by-day breakdown.
#   2) weekly:  harness invokes the agent with the JSON injected into the
#      prompt as DATA_CONTEXT — agent renders prose, decides the CLAUDE.md
#      learning line, and calls weekly-pr.sh to open the PR (the only agent
#      command that touches git).
name: "Agent — CI Weekly Deep Dive"

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: agent-weekly
  cancel-in-progress: false

permissions:
  contents: write       # commit memory updates
  issues: write         # triage issues
  pull-requests: write  # sticky comments
  actions: read         # CI MCP queries
  id-token: write       # harden-runner

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      context: ${{ steps.data.outputs.context }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pyyaml
        run: python3 -m pip install --quiet --user pyyaml

      - id: data
        name: Aggregate 7d CI stats + DORA
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/collect-weekly.py --out /tmp/weekly-stats.json
          {
            echo "context<<WEEKLY_EOF"
            cat /tmp/weekly-stats.json
            echo "WEEKLY_EOF"
          } >> "$GITHUB_OUTPUT"

  weekly:
    needs: collect
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: weekly-report
      prompt: |-
        /weekly-report
        ---
        DATA_CONTEXT:
        ${{ needs.collect.outputs.context }}
      # Renders prose + opens PR via scripts/weekly-pr.sh.
      max-turns: 30
      timeout-minutes: 30
      # date + gh issue list are used by the archive-old-incident step in
      # weekly-report.md. python / pyyaml live in the collect job, not here.
      extra-allowed-tools: "Bash(bash scripts/weekly-pr.sh),Bash(jq),Bash(date),Bash(gh issue list)"
    secrets: inherit
