# /weekly-report — every Monday UTC 02:00.
# All LLM/secret/permissions boilerplate lives in _call-harness.yml.
name: "Agent — CI Weekly Deep Dive"

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: agent-weekly
  cancel-in-progress: false

jobs:
  weekly:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: weekly-report
      prompt: /weekly-report
      max-turns: 50
      timeout-minutes: 35
