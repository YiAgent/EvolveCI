name: "CI Health - Daily Report"

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: ci-health-daily
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  collect:
    runs-on: blacksmith
    timeout-minutes: 15
    outputs:
      stats: ${{ steps.aggregate.outputs.stats }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Load onboarded repos
        id: repos
        shell: bash
        run: |
          repos=$(yq -r '.repos[].name' data/onboarded-repos.yml | paste -sd, -)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      - name: Query GitHub Actions
        id: query
        uses: ./actions/observability/sources/query-github-actions
        with:
          repos: ${{ steps.repos.outputs.repos }}
          since: "24h"
          status: all
          include-logs: "false"
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Compute per-workflow stats
        id: stats
        shell: bash
        run: |
          RUNS='${{ steps.query.outputs.runs }}'

          # Write jq filter to file to avoid quoting issues
          cat > /tmp/stats.jq << 'JQEOF'
          group_by([.repo, .workflowName]) |
          map({
            key: (.[0].repo + "/" + .[0].workflowName),
            repo: .[0].repo,
            workflow: .[0].workflowName,
            total: length,
            failed: [.[] | select(.conclusion == "failure")] | length,
            success: [.[] | select(.conclusion == "success")] | length,
            failure_rate: (if length > 0 then (([.[] | select(.conclusion == "failure")] | length) * 100 / length | floor) else 0 end)
          })
          JQEOF

          stats=$(echo "$RUNS" | jq -f /tmp/stats.jq)

          echo "stats<<EVOLVECI_EOF" >> "$GITHUB_OUTPUT"
          echo "$stats" >> "$GITHUB_OUTPUT"
          echo "EVOLVECI_EOF" >> "$GITHUB_OUTPUT"

      - name: Detect degradations
        id: degradations
        shell: bash
        run: |
          STATS='${{ steps.stats.outputs.stats }}'
          TODAY=$(date -u +%Y-%m-%d)

          degradations="[]"

          while IFS= read -r wf; do
            key=$(echo "$wf" | jq -r '.key')
            current_rate=$(echo "$wf" | jq -r '.failure_rate')
            repo=$(echo "$wf" | jq -r '.repo')
            workflow=$(echo "$wf" | jq -r '.workflow')

            # Read historical health from _state
            state_path="workflow-health/$(echo "$key" | tr '/' '-').json"
            git fetch origin _state --depth=1 2>/dev/null || true
            history=$(git show "origin/_state:$state_path" 2>/dev/null || echo '{"daily":{}}')

            # Calculate 7-day average
            seven_day_avg=$(echo "$history" | jq -r '
              .daily // {} |
              to_entries |
              sort_by(.key) |
              .[-7:] |
              if length > 0 then (map(.value) | add / length | floor) else 0 end')

            delta=$((current_rate - seven_day_avg))

            if [ "$delta" -gt 10 ]; then
              degradations=$(echo "$degradations" | jq \
                --arg key "$key" \
                --argjson current "$current_rate" \
                --argjson avg "$seven_day_avg" \
                --argjson delta "$delta" \
                '. + [{key: $key, current: $current, avg_7day: $avg, delta: $delta}]')
            fi
          done < <(echo "$STATS" | jq -c '.[]')

          echo "degradations<<EVOLVECI_EOF" >> "$GITHUB_OUTPUT"
          echo "$degradations" >> "$GITHUB_OUTPUT"
          echo "EVOLVECI_EOF" >> "$GITHUB_OUTPUT"

      - name: Update health history
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATS='${{ steps.stats.outputs.stats }}'
          TODAY=$(date -u +%Y-%m-%d)

          # Checkout _state branch
          git fetch origin _state --depth=1 2>/dev/null || true
          git checkout -B _state origin/_state 2>/dev/null || {
            git checkout --orphan _state
            git rm -rf . 2>/dev/null || true
            git -c user.name="evolveCI bot" -c user.email="bot@evolveci.dev" \
              commit --allow-empty -m "init: CI observability state branch"
          }

          mkdir -p workflow-health

          while IFS= read -r wf; do
            key=$(echo "$wf" | jq -r '.key')
            rate=$(echo "$wf" | jq -r '.failure_rate')
            state_path="workflow-health/$(echo "$key" | tr '/' '-').json"

            # Read existing
            existing=$(cat "$state_path" 2>/dev/null || echo '{"daily":{}}')

            # Merge today's rate
            updated=$(echo "$existing" | jq --arg d "$TODAY" --argjson r "$rate" '.daily[$d] = $r')
            echo "$updated" > "$state_path"
          done < <(echo "$STATS" | jq -c '.[]')

          # Commit and push
          git add workflow-health/
          git -c user.name="evolveCI bot" -c user.email="bot@evolveci.dev" \
            commit -m "state: update health history $TODAY" || true
          git push origin _state 2>/dev/null || echo "::warning::Failed to push health history"

          git checkout - 2>/dev/null || true

      - name: Aggregate output
        id: aggregate
        shell: bash
        run: |
          STATS='${{ steps.stats.outputs.stats }}'
          DEGRADATIONS='${{ steps.degradations.outputs.degradations }}'
          RUNS='${{ steps.query.outputs.runs }}'

          total_runs=$(echo "$RUNS" | jq 'length')
          total_failures=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "failure")] | length')

          if [ "$total_runs" -gt 0 ]; then
            failure_rate=$(( (total_failures * 100) / total_runs ))
          else
            failure_rate=0
          fi

          result=$(jq -n \
            --argjson total "$total_runs" \
            --argjson failures "$total_failures" \
            --argjson rate "$failure_rate" \
            --argjson workflows "$STATS" \
            --argjson degradations "$DEGRADATIONS" \
            --arg date "$(date -u +%Y-%m-%d)" \
            '{
              date: $date,
              total_runs: $total,
              total_failures: $failures,
              failure_rate: $rate,
              workflows: $workflows,
              degradations: $degradations
            }')

          {
            echo "stats<<EVOLVECI_EOF"
            echo "$result"
            echo "EVOLVECI_EOF"
          } >> "$GITHUB_OUTPUT"

  synthesize:
    needs: collect
    if: needs.collect.outputs.stats != '' && needs.collect.outputs.stats != '{}'
    runs-on: blacksmith
    timeout-minutes: 5
    outputs:
      result: ${{ steps.ai.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: AI synthesis
        id: ai
        uses: ./actions/observability/analyzers/call-glm
        with:
          prompt-path: "prompts/observability/daily-report.md"
          context: ${{ needs.collect.outputs.stats }}
          api-key: ${{ secrets.GLM_API_KEY }}
          base-url: ${{ secrets.GLM_BASE_URL }}
          model: ${{ secrets.GLM_MODEL }}

  publish:
    needs: synthesize
    if: needs.synthesize.outputs.result != ''
    runs-on: blacksmith
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Write report
        shell: bash
        env:
          REPORT: ${{ needs.synthesize.outputs.result }}
        run: |
          printf '%s' "$REPORT" > /tmp/daily-report.md

      - name: Set date
        id: date
        shell: bash
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Post issue report
        uses: ./actions/observability/publishers/post-issue-report
        with:
          title: "CI Health Report - ${{ steps.date.outputs.today }}"
          report-path: /tmp/daily-report.md
          labels: "daily-report,ci-health"

      - name: Post Slack report
        continue-on-error: true
        uses: ./actions/observability/publishers/post-slack-report
        env:
          REPORT_MSG: ${{ needs.synthesize.outputs.result }}
        with:
          webhook-url: ${{ secrets.SLACK_CI_WEBHOOK }}
          title: "CI Health Report - ${{ steps.date.outputs.today }}"
          message: ${{ env.REPORT_MSG }}
          status: info
