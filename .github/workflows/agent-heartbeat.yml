# /heartbeat — 5 health probes every 6h. Cf. .claude/commands/heartbeat.md.
# All LLM/secret/permissions boilerplate lives in _call-harness.yml.
name: "Agent — CI Heartbeat"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: agent-heartbeat
  cancel-in-progress: true

jobs:
  heartbeat:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: heartbeat
      prompt: /heartbeat
      max-turns: 15
      timeout-minutes: 10
