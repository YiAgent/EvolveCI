# ─────────────────────────────────────────────────────────────────────────────
# _call-harness.yml — internal reusable wrapper around OpenCI claude-harness.
# ─────────────────────────────────────────────────────────────────────────────
# DESIGN: every agent workflow in EvolveCI passes the same LLM provider, base
# URL, secret names, permissions superset, and harness pin. Owning that
# boilerplate here lets each agent workflow shrink to just its cron + the
# per-task knobs (max-turns, timeout, slash command). One change here updates
# everything.
#
# What lives in caller workflows: cron schedule, task name, prompt, turn
# budget, timeout. (cron MUST live there — GitHub triggers can't be sourced
# from a config file. The other four are intentionally per-task.)
#
# What lives here: model, api-provider, api-base-url, secret names, all
# required permissions, and the harness ref. Override the defaults via repo /
# org variables and secrets — see docs/CONFIG.md.
# ─────────────────────────────────────────────────────────────────────────────
name: _call-harness

on:
  workflow_call:
    inputs:
      task:
        description: "Logical task name (used by harness for prompt resolution)."
        type: string
        required: true
      prompt:
        description: "Direct prompt or /slash-command (resolved against caller's .claude/commands/)."
        type: string
        required: true
      max-turns:
        description: "Maximum agent turns."
        type: number
        required: true
      timeout-minutes:
        description: "Job timeout in minutes."
        type: number
        required: true
      extra-allowed-tools:
        description: "Extra Bash/MCP tools beyond the harness baseline (comma-separated)."
        type: string
        required: false
        default: ""

# Single permissions superset matches what the harness reusable workflow declares.
permissions:
  contents: write       # Claude commits memory updates back to main
  issues: write         # create / comment on triage issues
  pull-requests: write  # sticky-comment dedup on PRs
  actions: read         # query CI runs / job logs (mcp__github_ci__*)
  id-token: write       # required by claude-code-action's harden-runner

jobs:
  run:
    name: ${{ inputs.task }}
    uses: YiAgent/OpenCI/.github/workflows/claude-harness.yml@main
    with:
      task:                ${{ inputs.task }}
      prompt:              ${{ inputs.prompt }}
      # vars.CLAUDE_MODEL overrides the literal default for repo / org-wide
      # rollout (e.g. switch the whole project to claude-sonnet-4-5 without
      # touching workflow files).
      model:               ${{ vars.CLAUDE_MODEL || 'glm-5.1' }}
      api-provider:        anthropic
      max-turns:           ${{ inputs.max-turns }}
      timeout-minutes:     ${{ inputs.timeout-minutes }}
      # Issue/label/PR/branch operations the issue-as-memory model needs at
      # every agent (heartbeat / triage / daily / weekly). The harness baseline
      # in OpenCI ships the read-side (gh issue list/view/create/comment); these
      # add the upsert + lifecycle ops. Caller-supplied extras are appended.
      extra-allowed-tools: >-
        Bash(gh issue edit),Bash(gh issue close),Bash(gh issue reopen),Bash(gh label list),Bash(gh label create),Bash(gh pr create),Bash(git switch),Bash(git checkout),Bash(git push -u origin),Bash(python3),Bash(python3 -c),${{ inputs.extra-allowed-tools }}
    secrets:
      api-key:       ${{ secrets.GLM_API_KEY }}
      api-base-url:  ${{ secrets.GLM_BASE_URL || 'https://open.bigmodel.cn/api/anthropic' }}
      github-token:  ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
      slack-webhook: ${{ secrets.SLACK_CI_WEBHOOK }}
