name: "CI Heartbeat - Self Monitor"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: ci-heartbeat
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: blacksmith
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: "Probe: triage-failure last success"
        id: probe-triage
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last_success=$(gh run list \
            --workflow triage-failure.yml \
            --status success \
            --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty')

          if [ -z "$last_success" ]; then
            echo "::warning::triage-failure has never succeeded"
            echo "triage-ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if last success was > 24h ago
          last_epoch=$(date -d "$last_success" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$last_success" +%s 2>/dev/null || echo 0)
          now_epoch=$(date +%s)
          hours_ago=$(( (now_epoch - last_epoch) / 3600 ))

          if [ "$hours_ago" -gt 24 ]; then
            echo "::error::triage-failure last success was ${hours_ago}h ago (threshold: 24h)"
            echo "triage-ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::triage-failure healthy (last success ${hours_ago}h ago)"
            echo "triage-ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Probe: health data freshness"
        id: probe-health
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin _state --depth=1 2>/dev/null || true

          last_update=$(git log -1 --format=%at origin/_state -- workflow-health/ 2>/dev/null || echo 0)

          if [ "$last_update" -eq 0 ]; then
            echo "::warning::No health data found on _state branch"
            echo "health-ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          now_epoch=$(date +%s)
          hours_ago=$(( (now_epoch - last_update) / 3600 ))

          if [ "$hours_ago" -gt 48 ]; then
            echo "::warning::Health data is ${hours_ago}h old (threshold: 48h)"
            echo "health-ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Health data fresh (${hours_ago}h old)"
            echo "health-ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Probe: known-patterns health"
        id: probe-patterns
        shell: bash
        run: |
          git fetch origin _state --depth=1 2>/dev/null || true

          pattern_count=$(git show origin/_state:known-patterns.json 2>/dev/null | jq 'length' 2>/dev/null || echo 0)

          if [ "$pattern_count" -lt 3 ]; then
            echo "::warning::Only $pattern_count known patterns (threshold: 3)"
            echo "patterns-ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Known patterns healthy ($pattern_count patterns)"
            echo "patterns-ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate probes
        shell: bash
        run: |
          triage_ok="${{ steps.probe-triage.outputs.triage-ok }}"
          health_ok="${{ steps.probe-health.outputs.health-ok }}"
          patterns_ok="${{ steps.probe-patterns.outputs.patterns-ok }}"

          if [ "$triage_ok" = "false" ]; then
            echo "::error::Heartbeat FAILED: triage-failure not healthy"
            exit 1
          fi

          if [ "$health_ok" = "false" ]; then
            echo "::warning::Heartbeat WARNING: health data stale"
          fi

          if [ "$patterns_ok" = "false" ]; then
            echo "::warning::Heartbeat WARNING: low pattern count"
          fi

          echo "::notice::Heartbeat OK"
