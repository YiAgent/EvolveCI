# /daily-report — workdays at UTC 01:00.
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
# permissions MUST be declared here too (GitHub requires the calling job to
# pre-grant a superset of what the called workflow requests; superset cannot
# be inherited through workflow_call).
name: "Agent — CI Daily Report"

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: agent-daily
  cancel-in-progress: false

permissions:
  contents: write       # commit memory updates
  issues: write         # triage issues
  pull-requests: write  # sticky comments
  actions: read         # CI MCP queries
  id-token: write       # harden-runner

jobs:
  daily:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: daily-report
      prompt: /daily-report
      # v5.1: collector script does aggregation; agent only renders prose.
      max-turns: 20
      timeout-minutes: 20
      extra-allowed-tools: "Bash(python3 scripts/collect-daily.py),Bash(jq),Bash(pip install --user pyyaml),Bash(python3 -m pip install --user pyyaml)"
    secrets: inherit
