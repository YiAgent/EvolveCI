# /daily-report — workdays at UTC 01:00.
#
# Architecture (v5.1 agent-when-needed):
#   1) collect: Python collector aggregates 24h totals, top-failing workflows,
#      triage / pattern / circuit signals, top-3 failures with logs, and the
#      previous daily issue body (for trend comparison).
#   2) daily:   harness invokes the agent with that JSON injected into the
#      prompt as DATA_CONTEXT — agent only renders prose and upserts the
#      daily issue.
name: "Agent — CI Daily Report"

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: agent-daily
  cancel-in-progress: false

permissions:
  contents: write       # commit memory updates
  issues: write         # triage issues
  pull-requests: write  # sticky comments
  actions: read         # CI MCP queries
  id-token: write       # harden-runner

jobs:
  collect:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    outputs:
      context: ${{ steps.data.outputs.context }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pyyaml
        run: python3 -m pip install --quiet --user pyyaml

      - id: data
        name: Aggregate 24h CI stats
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/collect-daily.py --since 24h --out /tmp/daily-stats.json
          {
            echo "context<<DAILY_EOF"
            cat /tmp/daily-stats.json
            echo "DAILY_EOF"
          } >> "$GITHUB_OUTPUT"

  daily:
    needs: collect
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: daily-report
      prompt: |-
        /daily-report
        ---
        DATA_CONTEXT:
        ${{ needs.collect.outputs.context }}
      # Render-only: data is preprocessed by the collect job.
      max-turns: 20
      timeout-minutes: 15
      # /daily-report parses DATA_CONTEXT with sed/jq, then upserts the
      # evolveci/daily issue (date + gh issue list/create/edit). The harness
      # already whitelists gh issue edit; add the rest explicitly.
      extra-allowed-tools: "Bash(jq),Bash(sed),Bash(date),Bash(gh issue list),Bash(gh issue create)"
    secrets: inherit
