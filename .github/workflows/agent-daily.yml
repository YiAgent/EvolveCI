# /daily-report — workdays at UTC 01:00.
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
# permissions are scoped per-job (least privilege). The reusable-workflow
# call needs a superset of _call-harness.yml; the data collector only needs
# read access.
name: "Agent — CI Daily Report"

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: agent-daily
  cancel-in-progress: false

permissions: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      actions: read    # gh run list
      issues: read     # gh issue list (triage / pattern / circuit / daily)
    outputs:
      context: ${{ steps.data.outputs.context }}
    steps:
      - uses: actions/checkout@v4

      # Phase 1: 聚合 24h CI 数据（零 AI 成本）
      # 脚本查询所有仓库的 runs、计算指标、统计 issues，
      # 输出结构化 JSON，agent 只负责写报告。
      - name: Collect daily data
        id: data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/collect-daily-data.sh > /tmp/daily-context.json
          echo "context<<DAILY_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/daily-context.json >> "$GITHUB_OUTPUT"
          echo "DAILY_EOF" >> "$GITHUB_OUTPUT"

  daily:
    needs: collect
    permissions:
      contents: write       # Claude commits memory updates back to main
      issues: write         # triage issues
      pull-requests: write  # sticky comments
      actions: read         # CI MCP queries
      id-token: write       # harden-runner
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: daily-report
      prompt: |-
        /daily-report
        ---
        DATA_CONTEXT:
        ${{ needs.collect.outputs.context }}
      max-turns: 20
      timeout-minutes: 10
    secrets: inherit
