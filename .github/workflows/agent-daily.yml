# /daily-report — workdays at UTC 01:00.
# Shared LLM/secret/wrapper boilerplate lives in _call-harness.yml.
# permissions are scoped per-job (least privilege). The reusable-workflow
# call needs a superset of _call-harness.yml; the data collector only needs
# read access.
name: "Agent — CI Daily Report"

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: agent-daily
  cancel-in-progress: false

permissions: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      actions: read    # gh run list
      issues: read     # gh issue list (triage / pattern / circuit / daily)
    outputs:
      data_file: ${{ steps.data.outputs.data_file }}
      runs: ${{ steps.data.outputs.runs }}
      triage: ${{ steps.data.outputs.triage }}
    steps:
      - uses: actions/checkout@v4

      # Phase 1: 聚合 24h CI 数据（零 AI 成本）
      # 脚本查询所有仓库的 runs、计算指标、统计 issues，
      # 输出结构化 JSON，agent 只负责写报告。
      - name: Collect daily data
        id: data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/collect-daily-data.sh > /tmp/daily-context.json
          echo "data_file=/tmp/daily-context.json" >> "$GITHUB_OUTPUT"
          # 注入关键指标为标量
          runs=$(jq -c '.runs' /tmp/daily-context.json)
          triage=$(jq -c '.triage' /tmp/daily-context.json)
          echo "runs=$runs" >> "$GITHUB_OUTPUT"
          echo "triage=$triage" >> "$GITHUB_OUTPUT" 

  daily:
    needs: collect
    permissions:
      contents: write       # Claude commits memory updates back to main
      issues: write         # triage issues
      pull-requests: write  # sticky comments
      actions: read         # CI MCP queries
      id-token: write       # harden-runner
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: daily-report
      prompt-path: .claude/commands/daily-report.md
      context: '{"data_file": "${{ needs.collect.outputs.data_file }}", "runs": "${{ needs.collect.outputs.runs }}", "triage": "${{ needs.collect.outputs.triage }}"}'
      max-turns: 20
      timeout-minutes: 10
    secrets: inherit
