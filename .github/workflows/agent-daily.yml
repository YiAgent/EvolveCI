# /daily-report — workdays at UTC 01:00.
# All LLM/secret/permissions boilerplate lives in _call-harness.yml.
name: "Agent — CI Daily Report"

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

concurrency:
  group: agent-daily
  cancel-in-progress: false

jobs:
  daily:
    uses: ./.github/workflows/_call-harness.yml
    with:
      task: daily-report
      prompt: /daily-report
      max-turns: 40
      timeout-minutes: 25
