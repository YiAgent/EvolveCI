# EvolveCI 监控的仓库列表（agent /triage / /daily / /weekly 都会读它）.
#
# 字段:
#   name:      org/repo
#   workflows: "*" 表示所有 workflow；或逗号分隔的 yml 文件名
#   priority:  high | low (high 优先级仓库会先处理)
#   exclude:   排除特定 workflow 文件名（数组）
repos:
  - name: YiAgent/EvolveCI
    workflows: "*"
    priority: high
    exclude:
      - "agent-heartbeat.yml"
      - "agent-triage.yml"
      - "agent-daily.yml"
      - "agent-weekly.yml"

  - name: YiAgent/OpenCI
    workflows: "*"
    priority: high

  - name: YiAgent/aicert
    workflows: "*"
    priority: high
    exclude:
      - "agent-heartbeat.yml"
      - "agent-triage.yml"
      - "agent-daily.yml"
      - "agent-weekly.yml"
